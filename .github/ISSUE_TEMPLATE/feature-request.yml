name: Feature Request
description: Suggest a new feature or improvement for cTrader Skills
labels: [enhancement]
body:
  - type: checkboxes
    id: prerequisites
    attributes:
      label: Pre-submission Checks
      options:
        - label: I searched existing issues and found no duplicates
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or Use Case
      description: >-
        Describe the problem you are trying to solve or the use case for this feature. Focus on the problem, not the solution.
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: dropdown
    id: affected-area
    attributes:
      label: Affected Area
      description: Which area of the repository does this feature relate to?
      multiple: true
      options:
        - Skill content (SKILL.md)
        - Reference files (references/*.md)
        - Scripts (scripts/*.py)
        - Plugin metadata (.claude-plugin/*.json)
        - New skill request
        - CI / CD
        - Documentation
        - Installation (install.sh / npx skills)
        - Other
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe how you envision this feature working. This is optional.

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Describe any alternative solutions or features you have considered.

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      description: Would you be willing to help with this feature?
      options:
        - label: I would be willing to submit a PR
        - label: I can help test this feature

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context, mockups, or examples about the feature request here.
