name: Documentation Issue
description: Report an issue with the documentation of a cTrader skill
labels: [documentation]
body:
  # NOTE: Update this dropdown when adding or removing documentation files.
  - type: dropdown
    id: affected-docs
    attributes:
      label: Affected Documentation
      description: Select the documentation file(s) with the issue.
      multiple: true
      options:
        - README.md
        - CONTRIBUTING.md
        - SECURITY.md
        - CODE_OF_CONDUCT.md
        - CHANGELOG.md
        - COPYRIGHT.md
        - skills/ctrader-mcp-servers/SKILL.md
        - skills/ctrader-mcp-servers/references/local-http-server.md
        - skills/ctrader-mcp-servers/references/remote-http-server.md
        - skills/ctrader-mcp-servers/references/trader-workflows.md
        - skills/ctrader-mcp-servers/references/known-quirks.md
        - skills/ctrader-mcp-servers/references/self-healing-playbook.md
        - skills/ctrader-mcp-servers/scripts/conversion_rate.py
        - skills/ctrader-mcp-servers/scripts/pip_math.py
        - skills/ctrader-mcp-servers/scripts/position_sizing.py
        - skills/ctrader-mcp-servers/scripts/tiered_margin.py
        - skills/ctrader-mcp-servers/scripts/units_encoding.py
        - "Other / not sure"
    validations:
      required: true

  - type: dropdown
    id: issue-type
    attributes:
      label: Issue Type
      description: What kind of documentation issue is this?
      options:
        - Inaccurate
        - Missing
        - Unclear
        - Outdated
        - Broken link
        - Typo
        - Quirk Verify-fixed signal (server-side fix observed)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: >-
        Describe the documentation issue. What is wrong or missing? If applicable, include the section or paragraph where you found the problem.
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested Improvement
      description: If you have a suggestion for how to fix or improve the documentation, describe it here.
